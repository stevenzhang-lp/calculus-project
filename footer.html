<script>
document.addEventListener("DOMContentLoaded", function () {
    const spyLinks = document.querySelectorAll('#quarto-sidebar a[href*="#section-"]');
    
    // Find target elements dynamically using the hashes in the sidebar links
    const sections = [];
    spyLinks.forEach(link => {
        const href = link.getAttribute('href');
        if (href && href.includes('#')) {
            const hash = href.substring(href.indexOf('#'));
            try {
                const target = document.querySelector(hash);
                if (target) {
                    sections.push({ link: link, target: target });
                }
            } catch(e) {}
        }
    });
    
    // Intercept clicks on outline links: Smooth scroll without changing URL hash
    spyLinks.forEach(link => {
        link.addEventListener("click", function (e) {
            const href = this.getAttribute('href');
            if (href && href.includes('#')) {
                const hash = href.substring(href.indexOf('#'));
                try {
                    const target = document.querySelector(hash);
                    if (target) {
                        e.preventDefault();
                        e.stopPropagation();
                        // Scroll to upper-middle (25% from the top) instead of the very top
                        const offset = window.innerHeight * 0.25;
                        const targetPosition = target.getBoundingClientRect().top + window.scrollY;
                        window.scrollTo({
                            top: targetPosition - offset,
                            behavior: 'smooth'
                        });
                    }
                } catch(e) {}
            }
        }, true);
    });

    if (sections.length === 0) return;

    function handleScroll() {
        let scrollPosition = window.scrollY || document.documentElement.scrollTop;
        // Calculate offset dynamically based on viewport height (35% from top is upper-middle)
        const offset = window.innerHeight * 0.35;
        scrollPosition += offset; 

        let activeSectionIndex = -1;
        for (let i = 0; i < sections.length; i++) {
            const absoluteTop = sections[i].target.getBoundingClientRect().top + window.scrollY;
            if (absoluteTop <= scrollPosition) {
                activeSectionIndex = i;
            }
        }

        sections.forEach((item, index) => {
            if (index === activeSectionIndex) {
                item.link.classList.add('active');
                item.link.style.color = '#FFFFFF';
                item.link.style.fontWeight = '600';
            } else {
                item.link.classList.remove('active');
                item.link.style.color = '';
                item.link.style.fontWeight = '';
            }
        });
    }

    window.addEventListener('scroll', handleScroll);
    window.addEventListener('resize', handleScroll);
    setTimeout(handleScroll, 100); // Trigger once on load

    // Smooth expansion for sidebar section links before navigation
    const sectionLinks = document.querySelectorAll('.sidebar-item-container > a.sidebar-item-text.sidebar-link');
    sectionLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            const container = this.closest('.sidebar-item-container');
            if (!container) return;
            const toggle = container.querySelector('.sidebar-item-toggle');
            // If the section has a toggle and is currently collapsed
            if (toggle && toggle.classList.contains('collapsed')) {
                const href = this.getAttribute('href');
                // Only intercept if it's a real navigation link (not a hash link)
                if (href && !href.startsWith('#')) {
                    e.preventDefault();
                    // Click the toggle to start the expand animation
                    toggle.click();
                    // Wait for the Bootstrap collapse animation to finish (approx 350ms)
                    setTimeout(() => {
                        window.location.href = href;
                    }, 350);
                }
            }
        });
    });

});
</script>
