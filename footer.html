<script>
document.addEventListener("DOMContentLoaded", function () {
    const spyLinks = document.querySelectorAll('#quarto-sidebar a[href*="#section-"]');
    
    // Find target elements dynamically using the hashes in the sidebar links
    const sections = [];
    spyLinks.forEach(link => {
        const href = link.getAttribute('href');
        if (href && href.includes('#')) {
            const hash = href.substring(href.indexOf('#'));
            try {
                const target = document.querySelector(hash);
                if (target) {
                    sections.push({ link: link, target: target });
                }
            } catch(e) {}
        }
    });
    
    // Intercept clicks on outline links: Smooth scroll without changing URL hash
    spyLinks.forEach(link => {
        link.addEventListener("click", function (e) {
            const href = this.getAttribute('href');
            if (href && href.includes('#')) {
                const hash = href.substring(href.indexOf('#'));
                try {
                    const target = document.querySelector(hash);
                    if (target) {
                        e.preventDefault();
                        e.stopPropagation();
                        target.scrollIntoView({ behavior: 'smooth' });
                    }
                } catch(e) {}
            }
        }, true);
    });

    if (sections.length === 0) return;

    function handleScroll() {
        let scrollPosition = window.scrollY || document.documentElement.scrollTop;
        // Calculate offset dynamically based on viewport height (35% from top is upper-middle)
        const offset = window.innerHeight * 0.35;
        scrollPosition += offset; 

        let activeSectionIndex = -1;
        for (let i = 0; i < sections.length; i++) {
            const absoluteTop = sections[i].target.getBoundingClientRect().top + window.scrollY;
            if (absoluteTop <= scrollPosition) {
                activeSectionIndex = i;
            }
        }

        sections.forEach((item, index) => {
            if (index === activeSectionIndex) {
                item.link.classList.add('active');
                item.link.style.color = '#FFFFFF';
                item.link.style.fontWeight = '600';
            } else {
                item.link.classList.remove('active');
                item.link.style.color = '';
                item.link.style.fontWeight = '';
            }
        });
    }

    window.addEventListener('scroll', handleScroll);
    window.addEventListener('resize', handleScroll);
    setTimeout(handleScroll, 100); // Trigger once on load

    // --- Theme Toggle Implementation ---
    const sidebar = document.getElementById('quarto-sidebar');
    if (sidebar) {
        const toggleContainer = document.createElement('div');
        toggleContainer.className = 'theme-toggle-container';
        toggleContainer.innerHTML = `
            <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">
                <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <span id="theme-toggle-text">Dark Mode</span>
            </button>
        `;
        sidebar.appendChild(toggleContainer);

        const toggleBtn = document.getElementById('theme-toggle');
        const iconMoon = document.getElementById('theme-icon-moon');
        const iconSun = document.getElementById('theme-icon-sun');
        const textSpan = document.getElementById('theme-toggle-text');

        // Check local storage or system preference
        const currentTheme = localStorage.getItem('theme') || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            iconMoon.style.display = 'none';
            iconSun.style.display = 'block';
            textSpan.textContent = 'Light Mode';
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
        }

        toggleBtn.addEventListener('click', function() {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                iconMoon.style.display = 'block';
                iconSun.style.display = 'none';
                textSpan.textContent = 'Dark Mode';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                iconMoon.style.display = 'none';
                iconSun.style.display = 'block';
                textSpan.textContent = 'Light Mode';
            }
        });
    }
});
</script>
