<script>
document.addEventListener("DOMContentLoaded", function () {
    const spyLinks = document.querySelectorAll('#quarto-sidebar a[href*="#section-"]');
    const sections = [...document.querySelectorAll('h2[id]')];
    
    if (sections.length === 0 || spyLinks.length === 0) return;

    function handleScroll() {
        let scrollPosition = window.scrollY || document.documentElement.scrollTop;
        // Detect section when it reaches top portion of viewport
        scrollPosition += 180; 

        let activeSection = null;
        for (let i = 0; i < sections.length; i++) {
            // Get absolute top position relative to the document
            const absoluteTop = sections[i].getBoundingClientRect().top + window.scrollY;
            if (absoluteTop <= scrollPosition) {
                activeSection = sections[i];
            }
        }

        spyLinks.forEach(link => {
            link.classList.remove('active');
            if (activeSection) {
                const href = link.getAttribute('href');
                if (href && href.endsWith('#' + activeSection.id)) {
                    link.classList.add('active');
                }
            }
        });
    }

    window.addEventListener('scroll', handleScroll);
    window.addEventListener('resize', handleScroll);
    handleScroll(); // Trigger once on load
});
</script>
